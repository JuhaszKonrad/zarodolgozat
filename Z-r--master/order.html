<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="képek/favicon-32x32.png">
    <title>Étel rendelés</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar  -->
    <section class="navbar">
        <div class="container">
            <div class="logo">
                <img src="képek/logo.png" alt="Logo" class="img-responsive">
            </div>

            <div class="menu text-right">
                <ul>
                    <li>
                        <a href="index.html">Főoldal</a>
                    </li>
                    <li>
                        <a href="categories.html">Kategóriák</a>
                    </li>
                    <li>
                        <a href="foods.html">Ételek</a>
                    </li>
                    <li>
                        <a href="#">Kapcsolat</a>
                    </li>
                </ul>
            </div>
            <div class="clearfix">

            </div>

        </div>
    </section>

    <section class="order">
        <div class="container">

            <h2 class="text-center">Töltse ki adatait!</h2>

            <form action="#" class="order">
                <fieldset>
                    <legend>Választott Étel</legend>

                    <div class="food-menu-img">
                        <img src="képek/pizza.jpg" alt="Chicke Hawain Pizza" class="img-responsive img-curve">
                    </div>

                    <div class="food-menu-desc">
                        <h3>Songoku Pizza</h3>
                        <p class="food-ar">2000Ft</p>
                        <p class="food-leiras">Paradicsomos alap, Sonka, Gomba, Kukorica, Sajt</p> <br>
                        <div class="order-label">Darab</div>
                        <input type="number" name="qty" class="input-responsive" value="1" required>

                    </div>

                </fieldset>

                <fieldset>
                    <legend>Szállítási Adatok</legend>
                    <div class="order-label">Teljes Név</div>
                    <input type="text" name="full-name" placeholder="Teljes Név" class="input-responsive"
                        required>

                    <div class="order-label">Telefonszám</div>
                    <input type="tel" name="contact" placeholder="+36201234567" class="input-responsive" required>

                    <div class="order-label">Email</div>
                    <input type="email" name="email" placeholder="pelda@gmail.com" class="input-responsive"
                        required>

                    <div class="order-label">Cím</div>
                    <textarea name="address" rows="5" placeholder="Cím" class="input-responsive"
                        required></textarea>

                    <input type="submit" name="submit" value="Rendelés Leadása" class="btn btn-primary">
                </fieldset>

            </form>

        </div>
    </section>


    <!-- Social Media  -->
    <section class="social">
        <div class="container text-center">
            <ul>
                <li>
                    <a href="#"><img src="https://img.icons8.com/ios-filled/50/null/facebook-new.png" /></a>
                </li>
                <li>
                    <a href="#"><img src="https://img.icons8.com/ios-filled/50/null/instagram-new--v1.png" /></a>
                </li>
                <li>
                    <a href="#"><img src="https://img.icons8.com/ios/50/null/twitter--v1.png" /></a>
                </li>
            </ul>

        </div>
    </section>

    <!-- Footer  -->
    <section class="footer">
        <div class="container">
            <p class="text-center">Minden jog fenntartva. Tervezte <a href="#">Juhász Konrád</a></p>

        </div>
    </section>

</body>

</html>
